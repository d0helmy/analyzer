name: CI

# Build + test the .NET solution AND the Vite client bundle.
#
# Mirrors ../customizer/.github/workflows/ci.yml with one divergence:
# Analyzer runs the Vite client test alongside .NET tests because the
# slice-001 client is small + load-bearing (FR-006). Path-ignores still
# skip doc-only / gitignore-only PRs.

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'specs/**'
      - '**.md'
      - '.gitignore'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'specs/**'
      - '**.md'
      - '.gitignore'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test (.NET + client)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: analyzer

      - name: Checkout Customizer sibling (for ProjectReference)
        uses: actions/checkout@v4
        with:
          repository: d0helmy/customizer
          path: customizer
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          cache: true
          cache-dependency-path: |
            analyzer/Directory.Packages.props
            analyzer/**/*.csproj

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: analyzer/src/Analyzer/Client/package-lock.json

      - name: Install client dependencies
        working-directory: analyzer/src/Analyzer/Client
        run: npm ci

      - name: Build client bundle
        working-directory: analyzer/src/Analyzer/Client
        run: npm run build

      - name: Restore .NET
        working-directory: analyzer
        run: dotnet restore Analyzer.slnx

      - name: Build .NET (Release)
        working-directory: analyzer
        run: dotnet build Analyzer.slnx --no-restore --configuration Release

      - name: Run .NET tests
        # xUnit v3 ships its MTP runner inside the test executable; run
        # the test project directly rather than via `dotnet test` (same
        # workaround Customizer uses).
        working-directory: analyzer
        run: dotnet run --project src/Analyzer.Tests/Analyzer.Tests.csproj --no-build --configuration Release

      - name: Run client tests (Vitest)
        working-directory: analyzer/src/Analyzer/Client
        run: npm test
